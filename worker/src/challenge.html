<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nervous System States</title>
<!-- No Subresource Integrity here on purpose: Cloudflare serves/rotates this
     script dynamically server-side, so a pinned integrity hash would break
     on the next Cloudflare-side update. This is Cloudflare's own guidance
     for the Turnstile loader, not an oversight. -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>body{background:#0A0A0B;margin:0;min-height:100vh}</style>
</head>
<body>
<!--
  Invisible Turnstile widget. "Invisible" mode is set on the widget itself
  (Cloudflare dashboard/API config, not a client-side param) — no checkbox,
  no visible challenge for legitimate visitors. See docs/DECISIONS.md.
-->
<div class="cf-turnstile" data-sitekey="__SITEKEY__" data-action="turnstile-spin-v1" data-callback="onTsSuccess" data-error-callback="onTsError" style="display:none"></div>
<script>
function onTsSuccess(token) {
  fetch("/__verify", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ token: token }),
  })
    .then(function (r) { return r.json(); })
    .then(function (d) { if (d.success) { location.reload(); } });
}
function onTsError() {
  // Quietly retry. Real visitors resolve within ~1-2s; this never surfaces
  // any UI, so a slow retry loop costs nothing visible. Bots/headless
  // browsers that can't solve it just never get past this page.
  setTimeout(function () {
    if (window.turnstile) window.turnstile.reset();
  }, 1000);
}
</script>
</body>
</html>
